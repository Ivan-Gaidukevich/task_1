name: Autograding

on: [push]

jobs:
  grade:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout student repo
        uses: actions/checkout@v4

      - name: Checkout private tests
        uses: actions/checkout@v4
        with:
          repository: Ivan-Gaidukevich/task_1_tests
          token: ${{ secrets.TESTS_TOKEN }}
          path: private_tests

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        id: tests
        run: |
          # Запуск всех тестов в verbose, показываем все имена
          PYTHONPATH=$PWD pytest private_tests/tests/tests_all.py \
            -v --maxfail=0 --tb=short --disable-warnings \
            --junitxml=test_results.xml || true

      - name: Calculate score
        id: score
        run: |
          # Считаем score по специальной переменной в тестах
          SCORE=$(python3 -c "
          import pytest, sys
          from _pytest.config import get_config
          from private_tests.tests import tests_all

          config = get_config()
          pytest.main(['private_tests/tests/tests_all.py', '--maxfail=0', '--tb=short'])
          score = getattr(config, 'total_score', 0)
          print(score)
          ")
          echo "Score: $SCORE/20"
          echo "SCORE=$SCORE" >> $GITHUB_ENV

      - name: Badge
        run: |
          if [ "$SCORE" -eq 20 ]; then
            echo "All tests passed ✅"
          else
            echo "Some tests failed ❌"
          fi
      
